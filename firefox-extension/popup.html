<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <link rel="stylesheet" href="popup.css">
  <title>wearetosed</title>
</head>
<body>
  <div id="app">
    <header>
      <img src="icon48.png" alt="" class="header-logo">
      <h1>wearetosed</h1>
    </header>
    <p class="tagline">score any privacy policy</p>
    <div id="verdict"></div>
    <div id="breakdown" class="hidden"></div>

      <div class="empty-icon">...</div>
      <div>No policy or terms page found for this site.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
